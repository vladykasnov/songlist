<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Сонглист — Kosmos Lada</title>
  <meta name="description" content="Сонглист группы Kosmos Lada — поиск по названию, артисту и тегам.">

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Ctext y='13' font-size='14'%3E♪%3C/text%3E%3C/svg%3E">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#161616" media="(prefers-color-scheme: dark)">

  <meta property="og:title" content="Список песен Kosmos Lada">
  <meta property="og:description" content="Сонглист группы Kosmos Lada — поиск по названию, артисту и тегам.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://vladykasnov.github.io/songlist/">
  <meta name="twitter:card" content="summary">

  <script>
    // Применяем тему до отрисовки, чтобы избежать вспышки светлого фона.
    (function () {
      try {
        var t = localStorage.getItem("songlist-theme") || "system";
        var dark = (t === "dark") ||
          (t === "system" && window.matchMedia("(prefers-color-scheme: dark)").matches);
        if (dark) document.documentElement.classList.add("theme-dark");
      } catch (e) {}
    })();
  </script>

  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      max-width: 720px;
      margin: 24px auto;
      padding: 0 16px 48px;
      color: #222;
      line-height: 1.4;
    }
    h1 { font-size: 20px; margin: 0 0 4px; text-align: center; font-weight: 600; }
    .meta { font-size: 12px; color: #777; text-align: center; margin: 0 0 18px; }

    .search-wrap { position: relative; margin-bottom: 12px; }
    .search {
      width: 100%;
      padding: 10px 36px 10px 12px;
      font-size: 15px;
      border: 1px solid #ccc;
      border-radius: 6px;
      -webkit-appearance: none;
    }
    .search:focus { outline: none; border-color: #888; }
    .search::-webkit-search-cancel-button,
    .search::-webkit-search-decoration { -webkit-appearance: none; appearance: none; }
    .search-clear {
      position: absolute;
      right: 8px; top: 50%;
      transform: translateY(-50%);
      border: 0; background: none;
      font-size: 20px; line-height: 1;
      color: #999; cursor: pointer;
      padding: 4px 8px;
      display: none;
    }
    .search-clear:hover { color: #333; }

    ul.songs { list-style: none; padding: 0; margin: 0; border-top: 1px solid #eee; }
    ul.songs li {
      padding: 10px 4px;
      border-bottom: 1px solid #eee;
      cursor: pointer;
      transition: background-color .12s;
    }
    ul.songs li:hover { background-color: rgba(0, 0, 0, 0.025); }
    .theme-dark ul.songs li:hover { background-color: rgba(255, 255, 255, 0.04); }
    .title { font-size: 15px; }
    .artist { font-size: 12px; color: #777; margin-top: 2px; display: block; }

    @media (min-width: 600px) {
      ul.songs li {
        display: flex;
        gap: 16px;
        align-items: baseline;
        justify-content: space-between;
      }
      .title { flex: 1; min-width: 0; }
      .artist { margin-top: 0; flex: 0 0 auto; max-width: 45%; text-align: right; }
    }

    .empty, .error { text-align: center; padding: 24px 0; color: #999; }
    .error { color: #b00020; }

    .pager {
      display: flex; justify-content: center; align-items: center;
      gap: 4px; margin: 16px 0 0; flex-wrap: wrap;
    }
    .pager button {
      border: 1px solid #ccc; background: #fff;
      padding: 6px 10px; font-size: 13px; border-radius: 4px;
      cursor: pointer; min-width: 32px;
      color: #222;
    }
    .pager button:hover:not(:disabled) { border-color: #888; }
    .pager button:disabled { opacity: 0.35; cursor: not-allowed; }
    .pager button.active { background: #222; color: #fff; border-color: #222; }
    .pager .ellipsis, .pager .info { font-size: 12px; color: #777; padding: 0 4px; }
    .pager .info { width: 100%; text-align: center; margin-top: 8px; }

    mark { background: rgba(255, 213, 79, 0.35); color: inherit; padding: 0 1px; border-radius: 2px; }

    .tags { display: flex; flex-wrap: wrap; gap: 6px; margin: 0 0 14px; }
    .tag {
      border: 1px solid #ccc; background: #fff;
      padding: 4px 10px; font-size: 12px; border-radius: 999px;
      cursor: pointer; color: #444; line-height: 1.3;
    }
    .tag:hover { border-color: #888; }
    .tag.active { background: #222; color: #fff; border-color: #222; }
    .tag .count { opacity: 0.55; margin-left: 4px; font-variant-numeric: tabular-nums; }

    .actions {
      display: flex; justify-content: center; gap: 8px;
      flex-wrap: wrap; margin: 14px 0 28px;
    }
    .action-btn {
      display: inline-block;
      background: none; border: 1px solid #ddd;
      color: #333;
      font-size: 13px; cursor: pointer;
      padding: 5px 14px; border-radius: 999px;
      font-family: inherit; line-height: 1.3;
      text-decoration: none;
      transition: border-color .15s, background-color .15s;
    }
    .action-btn:hover { border-color: #888; background: rgba(255, 213, 79, 0.12); }

    @keyframes flashFade {
      from { background-color: rgba(255, 213, 79, 0.5); }
      to   { background-color: transparent; }
    }
    .flash { animation: flashFade 1.6s ease-out; }

    .theme-toggle {
      position: fixed; top: 12px; right: 12px;
      width: 32px; height: 32px;
      border: 1px solid #ddd; background: #fff;
      color: #555; cursor: pointer;
      border-radius: 50%; padding: 0;
      font-size: 14px; line-height: 1;
      display: flex; align-items: center; justify-content: center;
      font-family: inherit;
    }
    .theme-toggle:hover { border-color: #888; color: #222; }

    .theme-dark body { background: #161616; color: #e6e6e6; }
    .theme-dark .meta { color: #888; }
    .theme-dark .search { background: #1c1c1c; border-color: #3a3a3a; color: #e6e6e6; }
    .theme-dark .search:focus { border-color: #6a6a6a; }
    .theme-dark .search-clear { color: #888; }
    .theme-dark .search-clear:hover { color: #ddd; }
    .theme-dark ul.songs, .theme-dark ul.songs li { border-color: #2a2a2a; }
    .theme-dark .artist, .theme-dark .empty { color: #888; }
    .theme-dark .tag { background: #1c1c1c; border-color: #3a3a3a; color: #ccc; }
    .theme-dark .tag:hover { border-color: #6a6a6a; }
    .theme-dark .tag.active { background: #fff; color: #111; border-color: #fff; }
    .theme-dark .pager button { background: #1c1c1c; border-color: #3a3a3a; color: #ddd; }
    .theme-dark .pager button:hover:not(:disabled) { border-color: #6a6a6a; }
    .theme-dark .pager button.active { background: #fff; color: #111; border-color: #fff; }
    .theme-dark .pager .ellipsis, .theme-dark .pager .info { color: #888; }
    .theme-dark mark { background: rgba(255, 213, 79, 0.32); }
    .theme-dark .error { color: #ff5566; }
    .theme-dark .action-btn { color: #ddd; border-color: #3a3a3a; }
    .theme-dark .action-btn:hover { border-color: #6a6a6a; background: rgba(255, 213, 79, 0.1); }
    .theme-dark .theme-toggle { background: #1c1c1c; border-color: #3a3a3a; color: #ccc; }
    .theme-dark .theme-toggle:hover { border-color: #6a6a6a; color: #fff; }

    .tag-reset { color: #888; border-style: dashed; }
    .tag-reset:hover { color: #222; border-style: solid; border-color: #888; background: transparent; }
    .theme-dark .tag-reset { color: #888; border-color: #3a3a3a; background: transparent; }
    .theme-dark .tag-reset:hover { color: #fff; border-color: #6a6a6a; background: transparent; }

    .toast {
      position: fixed; left: 50%; bottom: 24px;
      transform: translateX(-50%) translateY(8px);
      background: rgba(20, 20, 20, 0.92); color: #fff;
      padding: 8px 16px; border-radius: 8px;
      font-size: 13px;
      max-width: calc(100% - 32px);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      opacity: 0; pointer-events: none;
      transition: opacity .18s ease, transform .18s ease;
      z-index: 100;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (prefers-reduced-motion: reduce) {
      .flash, .toast, .action-btn, .theme-toggle, ul.songs li { animation: none !important; transition: none !important; }
    }
  </style>
</head>
<body>
  <button type="button" class="theme-toggle" id="theme-toggle" aria-label="Тема"></button>
  <h1>Список песен Kosmos Lada</h1>
  <p class="meta" id="meta">Загрузка…</p>
  <div class="actions">
    <button type="button" class="action-btn" id="random-btn">→ случайная песня</button>
    <a class="action-btn" href="links.html">→ ссылки и поддержка</a>
  </div>

  <div class="search-wrap">
    <input
      type="search"
      class="search"
      id="search"
      placeholder="Поиск по названию или артисту"
      autocomplete="off"
      autocorrect="off"
      autocapitalize="off"
      spellcheck="false">
    <button class="search-clear" id="search-clear" aria-label="Очистить">×</button>
  </div>

  <div class="tags" id="tags"></div>

  <ul class="songs" id="list"></ul>
  <div class="pager" id="pager"></div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script>
    const CSV_URL = "songs.csv";
    const PAGE_SIZE = 25;
    // Теги, которые не показываем как чипы (одноразовые акции и т.п.).
    // Сами песни с этими тегами остаются в списке — скрывается только фильтр.
    const HIDDEN_TAGS = new Set(["СОВМЕСТНЫЙ СТРИМ"]);

    const state = { all: [], filtered: [], page: 1, query: "", tags: new Set(), tagList: [] };
    const $ = (id) => document.getElementById(id);

    function escapeHtml(s) {
      return String(s ?? "").replace(/[&<>"']/g, c => ({
        "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
      }[c]));
    }

    // Поиск регистронезависимый, ё→е, повторяющиеся пробелы схлопываются.
    function normalize(s) {
      return String(s ?? "").toLowerCase().replace(/ё/g, "е").replace(/\s+/g, " ").trim();
    }

    // То же, но без схлопывания пробелов — длина строки сохраняется,
    // чтобы индексы совпадали с оригиналом для подсветки.
    function normalizeKeepLen(s) {
      return String(s ?? "").toLowerCase().replace(/ё/g, "е");
    }

    function highlight(text, terms) {
      if (!terms.length) return escapeHtml(text);
      const norm = normalizeKeepLen(text);
      const ranges = [];
      for (const t of terms) {
        if (!t) continue;
        let i = 0;
        while ((i = norm.indexOf(t, i)) !== -1) {
          ranges.push([i, i + t.length]);
          i += t.length;
        }
      }
      if (!ranges.length) return escapeHtml(text);
      ranges.sort((a, b) => a[0] - b[0]);
      const merged = [ranges[0].slice()];
      for (let i = 1; i < ranges.length; i++) {
        const last = merged[merged.length - 1];
        if (ranges[i][0] <= last[1]) last[1] = Math.max(last[1], ranges[i][1]);
        else merged.push(ranges[i].slice());
      }
      let out = "", cursor = 0;
      for (const [a, b] of merged) {
        out += escapeHtml(text.slice(cursor, a));
        out += "<mark>" + escapeHtml(text.slice(a, b)) + "</mark>";
        cursor = b;
      }
      out += escapeHtml(text.slice(cursor));
      return out;
    }

    function applyFilter() {
      const q = normalize(state.query);
      const terms = q ? q.split(" ").filter(Boolean) : [];
      const hasTags = state.tags.size > 0;

      state.filtered = state.all.filter(s => {
        if (terms.length && !terms.every(t => s._search.includes(t))) return false;
        if (hasTags) {
          for (const t of state.tags) if (!s.tags.includes(t)) return false;
        }
        return true;
      });
      state.page = 1;
      syncUrl();
      render();
    }

    function renderTags() {
      const el = $("tags");
      const chips = state.tagList.map(([name, count]) => {
        const active = state.tags.has(name) ? " active" : "";
        const safe = escapeHtml(name);
        return '<button type="button" class="tag' + active + '" data-tag="' + safe + '">' +
               safe + '<span class="count">' + count + '</span></button>';
      });
      if (state.query || state.tags.size) {
        chips.push('<button type="button" class="tag tag-reset" id="tag-reset">× сбросить</button>');
      }
      el.innerHTML = chips.join("");
    }

    function resetFilters() {
      state.query = "";
      state.tags.clear();
      searchInput.value = "";
      clearBtn.style.display = "none";
      renderTags();
      applyFilter();
      searchInput.focus();
    }

    // ---- URL state (#q=...&tags=a,b) ----
    function syncUrl() {
      const params = new URLSearchParams();
      if (state.query) params.set("q", state.query);
      if (state.tags.size) params.set("tags", [...state.tags].join(","));
      const target = params.toString() ? "#" + params.toString() : location.pathname + location.search;
      if (location.hash !== (params.toString() ? "#" + params.toString() : "")) {
        history.replaceState(null, "", target);
      }
    }

    function readUrl() {
      const raw = location.hash.startsWith("#") ? location.hash.slice(1) : "";
      const params = new URLSearchParams(raw);
      state.query = params.get("q") || "";
      const tagsParam = params.get("tags");
      state.tags = new Set(tagsParam ? tagsParam.split(",").filter(Boolean) : []);
    }

    function render() {
      const total = state.filtered.length;
      const totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
      if (state.page > totalPages) state.page = totalPages;

      const start = (state.page - 1) * PAGE_SIZE;
      const end = Math.min(start + PAGE_SIZE, total);

      const list = $("list");
      if (total === 0) {
        list.innerHTML = '<li class="empty">Ничего не найдено</li>';
      } else {
        const terms = normalize(state.query).split(" ").filter(Boolean);
        const html = [];
        for (let i = start; i < end; i++) {
          const s = state.filtered[i];
          html.push(
            '<li data-title="' + escapeHtml(s.title) + '"' +
            (s.artist ? ' data-artist="' + escapeHtml(s.artist) + '"' : '') + '>' +
            '<span class="title">' + highlight(s.title, terms) + '</span>' +
            (s.artist ? '<span class="artist">' + highlight(s.artist, terms) + '</span>' : '') +
            '</li>'
          );
        }
        list.innerHTML = html.join("");
      }

      renderPager(totalPages, total, start, end);
    }

    function renderPager(totalPages, total, start, end) {
      const pager = $("pager");
      if (total === 0) { pager.innerHTML = ""; return; }

      const p = state.page;
      const parts = [];
      parts.push('<button data-p="prev"' + (p === 1 ? ' disabled' : '') + ' aria-label="Назад">‹</button>');

      const window = new Set([1, totalPages, p, p - 1, p + 1]);
      const nums = [...window].filter(n => n >= 1 && n <= totalPages).sort((a, b) => a - b);
      let prev = 0;
      for (const n of nums) {
        if (n - prev > 1) parts.push('<span class="ellipsis">…</span>');
        parts.push('<button data-p="' + n + '"' + (n === p ? ' class="active"' : '') + '>' + n + '</button>');
        prev = n;
      }

      parts.push('<button data-p="next"' + (p === totalPages ? ' disabled' : '') + ' aria-label="Вперёд">›</button>');
      parts.push('<span class="info">' + (start + 1) + '–' + end + ' из ' + total + '</span>');

      pager.innerHTML = parts.join("");
    }

    $("pager").addEventListener("click", e => {
      const btn = e.target.closest("button[data-p]");
      if (!btn) return;
      const v = btn.dataset.p;
      const totalPages = Math.max(1, Math.ceil(state.filtered.length / PAGE_SIZE));
      if (v === "prev") state.page = Math.max(1, state.page - 1);
      else if (v === "next") state.page = Math.min(totalPages, state.page + 1);
      else state.page = parseInt(v, 10);
      render();
      window.scrollTo({ top: 0, behavior: reduceMotion() ? "auto" : "smooth" });
    });

    $("tags").addEventListener("click", e => {
      if (e.target.closest("#tag-reset")) { resetFilters(); return; }
      const btn = e.target.closest("button[data-tag]");
      if (!btn) return;
      const t = btn.dataset.tag;
      if (state.tags.has(t)) state.tags.delete(t);
      else state.tags.add(t);
      renderTags();
      applyFilter();
    });

    // ---- Клик по песне → копирование названия в буфер ----
    let toastTimer = null;
    function showToast(text) {
      const t = $("toast");
      t.textContent = text;
      t.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove("show"), 1800);
    }
    $("list").addEventListener("click", e => {
      const li = e.target.closest("li[data-title]");
      if (!li) return;
      const title = li.dataset.title;
      const artist = li.dataset.artist || "";
      const text = artist ? title + " — " + artist : title;
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text)
          .then(() => showToast("Скопировано: " + text))
          .catch(() => showToast("Не удалось скопировать"));
      } else {
        showToast("Буфер обмена недоступен");
      }
    });

    const reduceMotion = () => window.matchMedia("(prefers-reduced-motion: reduce)").matches;

    window.addEventListener("hashchange", () => {
      readUrl();
      const si = $("search");
      si.value = state.query;
      $("search-clear").style.display = state.query ? "block" : "none";
      renderTags();
      applyFilter();
    });

    // ---- Переключение темы (system / light / dark) ----
    const THEME_KEY = "songlist-theme";
    const THEMES = ["system", "light", "dark"];
    const THEME_ICONS = { system: "◐", light: "☀", dark: "☾" };
    const THEME_LABELS = { system: "системная", light: "светлая", dark: "тёмная" };

    function getTheme() {
      const t = localStorage.getItem(THEME_KEY);
      return THEMES.includes(t) ? t : "system";
    }
    function applyTheme() {
      const t = getTheme();
      const dark = (t === "dark") ||
        (t === "system" && window.matchMedia("(prefers-color-scheme: dark)").matches);
      document.documentElement.classList.toggle("theme-dark", dark);
      const btn = $("theme-toggle");
      btn.textContent = THEME_ICONS[t];
      btn.title = "Тема: " + THEME_LABELS[t] + " — нажми, чтобы сменить";
      btn.setAttribute("aria-label", "Тема: " + THEME_LABELS[t]);
    }
    $("theme-toggle").addEventListener("click", () => {
      const next = THEMES[(THEMES.indexOf(getTheme()) + 1) % THEMES.length];
      if (next === "system") localStorage.removeItem(THEME_KEY);
      else localStorage.setItem(THEME_KEY, next);
      applyTheme();
    });
    window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", () => {
      if (getTheme() === "system") applyTheme();
    });
    applyTheme();

    function pickRandom() {
      if (!state.filtered.length) return;
      const idx = Math.floor(Math.random() * state.filtered.length);
      const targetPage = Math.floor(idx / PAGE_SIZE) + 1;
      const inPage = idx % PAGE_SIZE;
      if (state.page !== targetPage) {
        state.page = targetPage;
        render();
      }
      requestAnimationFrame(() => {
        const li = $("list").children[inPage];
        if (!li) return;
        if (!reduceMotion()) {
          li.classList.remove("flash");
          void li.offsetWidth; // restart animation
          li.classList.add("flash");
        }
        li.scrollIntoView({ behavior: reduceMotion() ? "auto" : "smooth", block: "center" });
      });
    }
    $("random-btn").addEventListener("click", pickRandom);

    // Хоткеи: "/" фокусит поиск, Esc очищает (или снимает фокус, если уже пусто).
    document.addEventListener("keydown", e => {
      if (e.metaKey || e.ctrlKey || e.altKey) return;
      const tag = (document.activeElement && document.activeElement.tagName) || "";
      const inField = tag === "INPUT" || tag === "TEXTAREA";
      if (e.key === "/" && !inField) {
        e.preventDefault();
        searchInput.focus();
        searchInput.select();
      } else if (e.key === "Escape" && document.activeElement === searchInput) {
        if (searchInput.value) {
          searchInput.value = "";
          state.query = "";
          clearBtn.style.display = "none";
          applyFilter();
        } else {
          searchInput.blur();
        }
      }
    });

    const searchInput = $("search");
    const clearBtn = $("search-clear");
    let searchTimer = null;
    searchInput.addEventListener("input", e => {
      state.query = e.target.value;
      clearBtn.style.display = state.query ? "block" : "none";
      clearTimeout(searchTimer);
      searchTimer = setTimeout(applyFilter, 80);
    });
    clearBtn.addEventListener("click", () => {
      searchInput.value = "";
      state.query = "";
      clearBtn.style.display = "none";
      applyFilter();
      searchInput.focus();
    });

    async function init() {
      const res = await fetch(CSV_URL, { cache: "no-store" });
      if (!res.ok) throw new Error("Не удалось загрузить songs.csv (HTTP " + res.status + ")");
      const csvText = await res.text();
      const parsed = Papa.parse(csvText, { header: true, skipEmptyLines: true });
      if (parsed.errors && parsed.errors.length) console.warn("CSV parse warnings:", parsed.errors);

      const rows = (parsed.data || [])
        .filter(r => String(r.active ?? "").trim().toLowerCase() === "true")
        .map(r => {
          const title = (r.title ?? "").trim();
          const artist = (r.artist ?? "").trim();
          const tags = (r.attributes ?? "").split(",").map(t => t.trim()).filter(Boolean);
          return { title, artist, tags, _search: normalize(title + " " + artist) };
        })
        .filter(r => r.title);

      state.all = rows;

      const tagCounts = new Map();
      for (const s of rows) for (const t of s.tags) {
        if (HIDDEN_TAGS.has(t)) continue;
        tagCounts.set(t, (tagCounts.get(t) || 0) + 1);
      }
      state.tagList = [...tagCounts.entries()]
        .sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0], "ru"));

      // Подхватим состояние из URL и приведём в соответствие UI.
      readUrl();
      // Отбросим теги, которых нет в данных, чтобы кривой URL не ломал фильтр.
      const known = new Set(state.tagList.map(([n]) => n));
      state.tags = new Set([...state.tags].filter(t => known.has(t)));
      searchInput.value = state.query;
      clearBtn.style.display = state.query ? "block" : "none";

      const lastMod = res.headers.get("last-modified");
      let metaText = "Всего: " + rows.length;
      if (lastMod) {
        const d = new Date(lastMod);
        if (!isNaN(d)) {
          metaText += " · обновлено " + d.toLocaleDateString("ru-RU");
        }
      }
      $("meta").textContent = metaText;

      renderTags();
      applyFilter();
    }

    init().catch(err => {
      console.error(err);
      $("meta").textContent = "";
      $("list").innerHTML = '<li class="error">Ошибка: ' + escapeHtml(err.message) + '</li>';
    });
  </script>
</body>
</html>
